# Fly.io deploy config for the LearnCode API.
#
# Region "sin" (Singapore) is set as a sensible default — closest to KL
# users. Change it after `fly launch` if your audience is elsewhere.
#
# Quick start:
#   1. flyctl auth login
#   2. flyctl launch --no-deploy --copy-config --name learncode-api
#         (skip on prompts to keep this fly.toml as-is)
#   3. Set secrets:
#         flyctl secrets set \
#           DATABASE_URL='postgresql://...' \
#           JWT_SECRET='...' \
#           COOKIE_SECRET='...' \
#           WEB_ORIGINS='https://your-domain.example' \
#           SENTRY_DSN='https://...sentry.io/...'
#   4. flyctl deploy
#
# For a staging app: copy this file to fly.staging.toml, change `app`,
# then `flyctl deploy --config fly.staging.toml`.

app = "learncode-api"
primary_region = "sin"

[build]
  dockerfile = "apps/api/Dockerfile"

[deploy]
  # Runs in a one-off machine before the new release goes live. Fails
  # the deploy if migrations don't apply cleanly — so a broken migration
  # never reaches users.
  release_command = "pnpm --filter @learncode/api exec prisma migrate deploy"

[env]
  NODE_ENV = "production"
  API_HOST = "0.0.0.0"
  API_PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  # Free-tier-friendly: machines stop when idle, cold-start on demand.
  # Set min_machines_running = 1 once you have real traffic.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
