name: Deploy API to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'prisma/**'
      - 'pnpm-lock.yaml'
      - 'fly.toml'
      - 'apps/api/Dockerfile'
      - '.github/workflows/deploy-api.yml'

  # Manual trigger for re-deploys without a source change.
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # --remote-only builds the image on Fly's builder, avoiding
      # ~15 min of "transfer docker layers from CI to Fly".
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
