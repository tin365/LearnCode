# Render Blueprint for the LearnCode API.
# https://render.com/docs/blueprint-spec
#
# Connect this repo in the Render dashboard ("New + → Blueprint"), point at
# this file, and Render provisions the service. Secrets are sync: false —
# Render will prompt for each one on first deploy, and they live in the
# dashboard (not in this file or git).
#
# External Postgres: paste the provider's connection string into DATABASE_URL.
# WEB_ORIGINS: comma-separated browser origins allowed by CORS (e.g. the
# Cloudflare Pages URL).
services:
  - type: web
    name: learncode-api
    runtime: docker
    region: singapore
    # Free tier sleeps after ~15 min idle (cold start ~30s next request).
    # Upgrade to `starter` ($7/mo) to keep the service always-on AND to
    # enable preDeployCommand for automatic migrations on deploy.
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    # Migrations: free tier doesn't support preDeployCommand, so run
    # `prisma migrate deploy` manually from your laptop after pushing a
    # schema change:
    #   DATABASE_URL='<render postgres url>' pnpm exec prisma migrate deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: WEB_ORIGINS
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        sync: false
      - key: SENTRY_RELEASE
        sync: false
